name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Pre-deploy: Backup runtime data (DB + dashboard) on VPS
        run: |
          ssh root@135.181.148.220 '
            set -e
            BACKUP_DIR="/root/.ecohandel-backup-before-deploy"
            mkdir -p "$BACKUP_DIR"
            # Backup runtime data dirs if they exist
            [ -d /var/www/html/control.ecohandel.nl/data ] && cp -r /var/www/html/control.ecohandel.nl/data "$BACKUP_DIR/data"
            [ -d /var/www/html/control.ecohandel.nl/dashboard-data ] && cp -r /var/www/html/control.ecohandel.nl/dashboard-data "$BACKUP_DIR/dashboard-data"
            # Backup .env if exists
            [ -f /var/www/html/control.ecohandel.nl/.env ] && cp /var/www/html/control.ecohandel.nl/.env "$BACKUP_DIR/.env"
            # Backup .htpasswd if exists
            [ -f /var/www/html/control.ecohandel.nl/.htpasswd ] && cp /var/www/html/control.ecohandel.nl/.htpasswd "$BACKUP_DIR/.htpasswd"
            echo "✅ Runtime data backed up to $BACKUP_DIR"
            ls -la "$BACKUP_DIR"
          '

      - name: Deploy to VPS
        run: |
          ssh-keyscan -H 135.181.148.220 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz \
            --exclude='.git' \
            --exclude='*.db' \
            --exclude='*.log' \
            --exclude='logs/' \
            --exclude='__pycache__/' \
            --exclude='.venv/' \
            --exclude='.env' \
            --exclude='.htpasswd' \
            --exclude='*.key' \
            --exclude='*.pem' \
            --exclude='.gitignore' \
            --exclude='README*' \
            --exclude='*.md' \
            ./ \
            root@135.181.148.220:/var/www/html/control.ecohandel.nl/

      - name: Post-deploy: Restore runtime data + fix perms
        run: |
          ssh root@135.181.148.220 '
            set -e
            BACKUP_DIR="/root/.ecohandel-backup-before-deploy"
            TARGET="/var/www/html/control.ecohandel.nl"

            # Restore .env if backup exists
            if [ -f "$BACKUP_DIR/.env" ]; then
              cp "$BACKUP_DIR/.env" "$TARGET/.env"
              echo "✅ .env restored"
            fi

            # Restore .htpasswd if backup exists
            if [ -f "$BACKUP_DIR/.htpasswd" ]; then
              cp "$BACKUP_DIR/.htpasswd" "$TARGET/.htpasswd"
              echo "✅ .htpasswd restored"
            fi

            # Restore data/ (runtime DB) if backup exists
            if [ -d "$BACKUP_DIR/data" ]; then
              rm -rf "$TARGET/data"
              cp -r "$BACKUP_DIR/data" "$TARGET/data"
              echo "✅ runtime data/ restored ($(ls $TARGET/data/*.db 2>/dev/null | xargs -I{} basename {}))"
            fi

            # Restore dashboard-data/ (runtime JSON data) if backup exists
            if [ -d "$BACKUP_DIR/dashboard-data" ]; then
              rm -rf "$TARGET/dashboard-data"
              cp -r "$BACKUP_DIR/dashboard-data" "$TARGET/dashboard-data"
              echo "✅ dashboard-data/ restored"
            fi

            # Fix permissions
            chown -R www-data:www-data "$TARGET"
            find "$TARGET" -type d -exec chmod 755 {} \;
            find "$TARGET" -type f -exec chmod 644 {} \;
            # Ensure DB is writable
            chmod 644 "$TARGET/data"/*.db 2>/dev/null || true
            chmod 755 "$TARGET/data" 2>/dev/null || true
            echo "✅ Permissions fixed"
          '

      - name: Install Google API libs on VPS
        run: |
          ssh root@135.181.148.220 \
            "/opt/ecohandel-venv/bin/pip install --quiet google-api-python-client google-auth 2>/dev/null || true"

      - name: Setup cron job for auto-fetch
        run: |
          ssh root@135.181.148.220 \
            "cat > /etc/cron.d/ecohandel-fetch << 'CRONEOF'
SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin
*/30 * * * * www-data /opt/ecohandel-venv/bin/python3 /var/www/html/control.ecohandel.nl/dashboard-data/scripts/fetch_all.py >> /var/log/ecohandel-fetch.log 2>&1
CRONEOF
chmod 644 /etc/cron.d/ecohandel-fetch"

      - name: Health check after deploy
        run: |
          echo "Waiting 3s for server to settle..."
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "milan:clawd" \
            http://127.0.0.1:5555/health)
          echo "Health check HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with code $HTTP_CODE"
            exit 1
          fi

      - name: Cache busting — update service worker version
        run: |
          ssh root@135.181.148.220 \
            "cd /var/www/html/control.ecohandel.nl && \
             SW_VERSION=$(date +%s) && \
             sed -i \"s/const CACHE_VERSION = '[0-9]*'/const CACHE_VERSION = '$SW_VERSION'/\" sw.js && \
             echo \"Service worker cache version updated to: \$SW_VERSION\""
