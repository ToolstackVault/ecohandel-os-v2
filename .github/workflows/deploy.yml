name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Pre-deploy: Backup runtime data on VPS
        run: |
          ssh root@135.181.148.220 "mkdir -p /root/.ecohandel-backup-before-deploy"
          ssh root@135.181.148.220 "test -d /var/www/html/control.ecohandel.nl/data && cp -r /var/www/html/control.ecohandel.nl/data /root/.ecohandel-backup-before-deploy/ || true"
          ssh root@135.181.148.220 "test -d /var/www/html/control.ecohandel.nl/dashboard-data && cp -r /var/www/html/control.ecohandel.nl/dashboard-data /root/.ecohandel-backup-before-deploy/ || true"
          ssh root@135.181.148.220 "test -f /var/www/html/control.ecohandel.nl/.env && cp /var/www/html/control.ecohandel.nl/.env /root/.ecohandel-backup-before-deploy/.env || true"
          ssh root@135.181.148.220 "test -f /var/www/html/control.ecohandel.nl/.htpasswd && cp /var/www/html/control.ecohandel.nl/.htpasswd /root/.ecohandel-backup-before-deploy/.htpasswd || true"
          ssh root@135.181.148.220 "echo 'Backup done:' && ls /root/.ecohandel-backup-before-deploy/"

      - name: Deploy to VPS
        run: |
          ssh-keyscan -H 135.181.148.220 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz \
            --exclude=.git \
            --exclude='*.db' \
            --exclude='*.log' \
            --exclude=logs \
            --exclude=__pycache__ \
            --exclude=.venv \
            --exclude=.env \
            --exclude=.htpasswd \
            --exclude='*.key' \
            --exclude='*.pem' \
            --exclude=.gitignore \
            --exclude='README*' \
            --exclude='*.md' \
            ./ \
            root@135.181.148.220:/var/www/html/control.ecohandel.nl/

      - name: Post-deploy: Restore runtime data + fix perms
        run: |
          ssh root@135.181.148.220 "BACKUP=/root/.ecohandel-backup-before-deploy; TARGET=/var/www/html/control.ecohandel.nl; \
            test -f $BACKUP/.env && cp $BACKUP/.env $TARGET/.env && echo 'env restored' || true; \
            test -f $BACKUP/.htpasswd && cp $BACKUP/.htpasswd $TARGET/.htpasswd && echo 'htpasswd restored' || true; \
            test -d $BACKUP/data && rm -rf $TARGET/data && cp -r $BACKUP/data $TARGET/data && echo 'data restored' || true; \
            test -d $BACKUP/dashboard-data && rm -rf $TARGET/dashboard-data && cp -r $BACKUP/dashboard-data $TARGET/dashboard-data && echo 'dashboard restored' || true"
          ssh root@135.181.148.220 "chown -R www-data:www-data /var/www/html/control.ecohandel.nl && find /var/www/html/control.ecohandel.nl -type d -exec chmod 755 {} \; && find /var/www/html/control.ecohandel.nl -type f -exec chmod 644 {} \; && chmod 644 /var/www/html/control.ecohandel.nl/data/*.db 2>/dev/null || true && chmod 755 /var/www/html/control.ecohandel.nl/data 2>/dev/null || true && echo 'Perms fixed'"

      - name: Install Google API libs on VPS
        run: |
          ssh root@135.181.148.220 "/opt/ecohandel-venv/bin/pip install --quiet google-api-python-client google-auth 2>/dev/null || true"

      - name: Setup cron job for auto-fetch
        run: |
          ssh root@135.181.148.220 "echo 'SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin
*/30 * * * * www-data /opt/ecohandel-venv/bin/python3 /var/www/html/control.ecohandel.nl/dashboard-data/scripts/fetch_all.py >> /var/log/ecohandel-fetch.log 2>&1' | tee /etc/cron.d/ecohandel-fetch && chmod 644 /etc/cron.d/ecohandel-fetch"

      - name: Health check after deploy
        run: |
          echo "Waiting 3s for server to settle..."
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "milan:clawd" http://127.0.0.1:5555/health)
          echo "Health check HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with code $HTTP_CODE"
            exit 1
          fi

      - name: Cache busting — update service worker version
        run: |
          ssh root@135.181.148.220 "cd /var/www/html/control.ecohandel.nl && SW_VERSION=$(date +%s) && sed -i \"s/const CACHE_VERSION = '[0-9]*'/const CACHE_VERSION = '$SW_VERSION'/\" sw.js && echo \"SW version: $SW_VERSION\""
